<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Voice Alert Receiver Setup</title>
    <style>
      body {
        margin: 0;
        background: #111318;
        color: #eef0f4;
        font-family: -apple-system, Segoe UI, Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      form {
        width: 320px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 4px 0;
      }
      p {
        font-size: 13px;
        color: #9aa1b1;
        margin: 0 0 8px 0;
        line-height: 1.4;
      }
      label {
        font-size: 12px;
        color: #9aa1b1;
      }
      input {
        background: #1b1e26;
        border: 1px solid #2c2f3a;
        border-radius: 6px;
        color: #eef0f4;
        padding: 10px;
        font-size: 14px;
        outline: none;
      }
      input:focus {
        border-color: #ef4444;
      }
      button {
        background: #ef4444;
        border: none;
        border-radius: 6px;
        color: white;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 6px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #error {
        color: #ef4444;
        font-size: 12px;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <form id="setup-form">
      <h1>Voice Alert Receiver</h1>
      <p>Connect this computer to your admin's voice alert server.</p>
      <div>
        <label for="serverUrl">Server address</label><br />
        <input
          id="serverUrl"
          type="text"
          placeholder="https://your-server.replit.app"
          autocomplete="off"
        />
      </div>
      <div>
        <label for="nickname">This computer's nickname</label><br />
        <input
          id="nickname"
          type="text"
          placeholder="e.g. Front Desk"
          maxlength="60"
          autocomplete="off"
        />
      </div>
      <div id="error"></div>
      <button id="submit" type="submit">Save & Connect</button>
    </form>
    <script src="./setup.js"></script>
  </body>
</html>
